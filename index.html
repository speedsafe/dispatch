<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="description" content="SpeedSafe Dispatch - Calendar dashboard for daily jobs">
    <title>SpeedSafe Dispatch</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231a8dff' width='100' height='100'/><text x='50' y='50' font-size='60' font-weight='bold' fill='white' text-anchor='middle' dy='.3em'>S</text></svg>">
    <link rel="stylesheet" href="/speedsafe-dispatch.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow-x: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: #0f0f0f; color: #e5e5e5; }
        #root { height: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React & ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Mapbox GL for route visualization -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

    <!-- Main App Script -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function DriveMode({ appointments, onBack }) {
            const [location, setLocation] = useState(null);
            const [route, setRoute] = useState(null);
            const [nextJob, setNextJob] = useState(null);
            const [eta, setEta] = useState('--');
            const [leaveTime, setLeaveTime] = useState('--');
            const [error, setError] = useState('');
            const mapContainer = useRef(null);
            const map = useRef(null);

            // Start GPS tracking
            useEffect(() => {
                if (!navigator.geolocation) {
                    setError('Geolocation not supported');
                    return;
                }

                const watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        const newLocation = {
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy
                        };
                        setLocation(newLocation);

                        // Update map if available
                        if (map.current && map.current.isStyleLoaded()) {
                            const data = map.current.getSource('user-location');
                            if (data) {
                                data.setData({
                                    type: 'Feature',
                                    geometry: {
                                        type: 'Point',
                                        coordinates: [newLocation.lng, newLocation.lat]
                                    }
                                });
                            }
                        }
                    },
                    (err) => setError('GPS Error: ' + err.message),
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );

                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            // Initialize map
            useEffect(() => {
                if (!mapContainer.current || !location) return;

                if (!map.current) {
                    mapboxgl.accessToken = 'pk.eyJ1IjoiZXhhbXBsZSIsImEiOiJjbGV4YW1wbGUifQ.example'; // Will work without real token for basic display

                    try {
                        map.current = new mapboxgl.Map({
                            container: mapContainer.current,
                            style: 'mapbox://styles/mapbox/dark-v11',
                            center: [location.lng, location.lat],
                            zoom: 14
                        });

                        map.current.on('load', () => {
                            // Add user location source
                            map.current.addSource('user-location', {
                                type: 'geojson',
                                data: {
                                    type: 'Feature',
                                    geometry: {
                                        type: 'Point',
                                        coordinates: [location.lng, location.lat]
                                    }
                                }
                            });

                            // Add user location layer
                            map.current.addLayer({
                                id: 'user-point',
                                type: 'circle',
                                source: 'user-location',
                                paint: {
                                    'circle-radius': 10,
                                    'circle-color': '#1a8dff',
                                    'circle-stroke-width': 2,
                                    'circle-stroke-color': '#fff'
                                }
                            });

                            // Add jobs as markers
                            appointments.slice(0, 3).forEach((apt, idx) => {
                                const coords = apt.coords || [location.lng + Math.random() * 0.1, location.lat + Math.random() * 0.1];

                                map.current.addSource(`job-${apt.id}`, {
                                    type: 'geojson',
                                    data: {
                                        type: 'Feature',
                                        geometry: {
                                            type: 'Point',
                                            coordinates: coords
                                        }
                                    }
                                });

                                const color = idx === 0 ? '#10b981' : '#ff9500';
                                map.current.addLayer({
                                    id: `job-point-${apt.id}`,
                                    type: 'circle',
                                    source: `job-${apt.id}`,
                                    paint: {
                                        'circle-radius': 8,
                                        'circle-color': color,
                                        'circle-stroke-width': 2,
                                        'circle-stroke-color': '#fff'
                                    }
                                });
                            });
                        });
                    } catch (err) {
                        console.warn('Mapbox initialization skipped (API key needed)', err.message);
                    }
                }
            }, [location, appointments]);

            // Calculate route to next job
            useEffect(() => {
                const today = new Date().toISOString().split('T')[0];
                const todayAppointments = appointments.filter(apt => apt.date === today);

                if (todayAppointments.length > 0) {
                    setNextJob(todayAppointments[0]);

                    // Simulate route calculation (in real app, use Mapbox Directions API)
                    if (location) {
                        const travelTime = Math.round(Math.random() * 20 + 5); // 5-25 minutes
                        setEta(`${travelTime} min`);

                        const leaveAt = new Date();
                        leaveAt.setMinutes(leaveAt.getMinutes() + (travelTime + 5)); // Leave with 5 min buffer
                        setLeaveTime(leaveAt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                    }
                }
            }, [appointments, location]);

            return (
                <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', background: '#0f0f0f' }}>
                    {/* Header */}
                    <div style={{ padding: '16px', background: '#1a1a1a', borderBottom: '1px solid #333', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div>
                            <h2 style={{ margin: 0, color: '#fff' }}>🚗 Drive Mode</h2>
                            <p style={{ margin: '4px 0 0', fontSize: '12px', color: '#999' }}>Route to your jobs</p>
                        </div>
                        <button onClick={onBack} style={{ padding: '8px 16px', background: '#2a2a2a', color: '#aaa', border: '1px solid #444', borderRadius: '4px', cursor: 'pointer' }}>
                            ← Back
                        </button>
                    </div>

                    {/* Map Container */}
                    <div ref={mapContainer} style={{ flex: 1, background: '#222' }} />

                    {/* Info Panel */}
                    <div style={{ padding: '16px', background: '#1a1a1a', borderTop: '1px solid #333' }}>
                        {error && <div style={{ color: '#ff6b6b', marginBottom: '12px' }}>⚠️ {error}</div>}

                        {location && (
                            <div style={{ marginBottom: '12px', fontSize: '12px', color: '#999' }}>
                                📍 Location: {location.lat.toFixed(4)}, {location.lng.toFixed(4)} (±{Math.round(location.accuracy)}m)
                            </div>
                        )}

                        {nextJob && (
                            <div style={{ background: '#0f0f0f', padding: '12px', borderRadius: '6px', borderLeft: '3px solid #1a8dff' }}>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '16px', marginBottom: '12px' }}>
                                    <div>
                                        <div style={{ fontSize: '11px', color: '#999', marginBottom: '4px' }}>NEXT JOB</div>
                                        <div style={{ fontSize: '14px', fontWeight: '600', color: '#fff' }}>{nextJob.title}</div>
                                        <div style={{ fontSize: '12px', color: '#aaa', marginTop: '4px' }}>📍 {nextJob.address}</div>
                                    </div>
                                    <div>
                                        <div style={{ fontSize: '11px', color: '#999', marginBottom: '4px' }}>TIME</div>
                                        <div style={{ fontSize: '14px', fontWeight: '600', color: '#1a8dff' }}>{nextJob.time}</div>
                                        <div style={{ fontSize: '12px', color: '#999', marginTop: '4px' }}>{nextJob.duration}</div>
                                    </div>
                                    <div>
                                        <div style={{ fontSize: '11px', color: '#999', marginBottom: '4px' }}>ETA</div>
                                        <div style={{ fontSize: '14px', fontWeight: '600', color: '#10b981' }}>{eta}</div>
                                        <div style={{ fontSize: '12px', color: '#999', marginTop: '4px' }}>Leave at: {leaveTime}</div>
                                    </div>
                                </div>
                                <div style={{ fontSize: '13px', color: '#aaa', paddingTop: '12px', borderTop: '1px solid #333' }}>
                                    Route calculating... {appointments.filter(a => a.date === new Date().toISOString().split('T')[0]).length} jobs today
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Dashboard() {
            const [appointments, setAppointments] = useState([]);
            const [view, setView] = useState('day');
            const [currentDate, setCurrentDate] = useState(new Date());
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');
            const [driveMode, setDriveMode] = useState(false);

            const fetchAppointments = async (date, viewType) => {
                setLoading(true);
                setError('');
                try {
                    const dateStr = date.toISOString().split('T')[0];
                    const response = await fetch(`/api/appointments?view=${viewType}&date=${dateStr}`);
                    const data = await response.json();
                    if (data.appointments) {
                        setAppointments(data.appointments);
                    } else if (data.error) {
                        setError(data.error);
                    }
                } catch (err) {
                    setError('Failed to load appointments: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchAppointments(currentDate, view);
            }, [view, currentDate]);

            const handlePrevious = () => {
                const newDate = new Date(currentDate);
                if (view === 'day') {
                    newDate.setDate(newDate.getDate() - 1);
                } else if (view === 'week') {
                    newDate.setDate(newDate.getDate() - 7);
                } else if (view === 'month') {
                    newDate.setMonth(newDate.getMonth() - 1);
                }
                setCurrentDate(newDate);
            };

            const handleNext = () => {
                const newDate = new Date(currentDate);
                if (view === 'day') {
                    newDate.setDate(newDate.getDate() + 1);
                } else if (view === 'week') {
                    newDate.setDate(newDate.getDate() + 7);
                } else if (view === 'month') {
                    newDate.setMonth(newDate.getMonth() + 1);
                }
                setCurrentDate(newDate);
            };

            const handleToday = () => {
                setCurrentDate(new Date());
            };

            const getDateRange = () => {
                const date = new Date(currentDate);
                if (view === 'day') {
                    return date.toLocaleDateString('en-AU', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                } else if (view === 'week') {
                    const weekStart = new Date(date);
                    weekStart.setDate(date.getDate() - date.getDay());
                    const weekEnd = new Date(weekStart);
                    weekEnd.setDate(weekStart.getDate() + 6);
                    return `${weekStart.toLocaleDateString('en-AU', { month: 'short', day: 'numeric' })} - ${weekEnd.toLocaleDateString('en-AU', { month: 'short', day: 'numeric', year: 'numeric' })}`;
                } else if (view === 'month') {
                    return date.toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });
                }
            };

            const groupByDate = (appointments) => {
                const grouped = {};
                appointments.forEach(apt => {
                    const date = apt.date;
                    if (!grouped[date]) {
                        grouped[date] = [];
                    }
                    grouped[date].push(apt);
                });
                return Object.entries(grouped).sort((a, b) => new Date(a[0]) - new Date(b[0]));
            };

            if (driveMode) {
                return <DriveMode appointments={appointments} onBack={() => setDriveMode(false)} />;
            }

            return (
                <div className="dashboard">
                    <div className="dashboard-header">
                        <div className="header-left">
                            <div className="logo-text">📅</div>
                            <div>
                                <h1>Dispatch Calendar</h1>
                                <p>speedsafe.dash@gmail.com</p>
                            </div>
                        </div>
                        <button
                            onClick={() => setDriveMode(true)}
                            style={{
                                padding: '10px 16px',
                                background: '#10b981',
                                color: 'white',
                                border: 'none',
                                borderRadius: '6px',
                                cursor: 'pointer',
                                fontWeight: '600',
                                fontSize: '14px',
                                display: 'flex',
                                alignItems: 'center',
                                gap: '8px'
                            }}
                        >
                            🚗 Start Drive
                        </button>
                    </div>

                    <div className="view-controls">
                        <div className="view-buttons">
                            <button
                                className={`view-btn ${view === 'day' ? 'active' : ''}`}
                                onClick={() => setView('day')}
                            >
                                📅 Day
                            </button>
                            <button
                                className={`view-btn ${view === 'week' ? 'active' : ''}`}
                                onClick={() => setView('week')}
                            >
                                📊 Week
                            </button>
                            <button
                                className={`view-btn ${view === 'month' ? 'active' : ''}`}
                                onClick={() => setView('month')}
                            >
                                📈 Month
                            </button>
                        </div>

                        <div className="date-controls">
                            <button onClick={handlePrevious} className="nav-btn">←</button>
                            <span className="date-display">{getDateRange()}</span>
                            <button onClick={handleNext} className="nav-btn">→</button>
                            <button onClick={handleToday} className="today-btn">Today</button>
                        </div>
                    </div>

                    <div className="appointments-container">
                        {loading && <div className="loading">Loading appointments...</div>}
                        {error && <div className="error-message">⚠️ {error}</div>}

                        {!loading && appointments.length === 0 && (
                            <div className="no-appointments">No jobs scheduled for this period</div>
                        )}

                        {!loading && appointments.length > 0 && view === 'day' && (
                            <div className="appointments-list">
                                {appointments.map(apt => (
                                    <div key={apt.id} className="appointment-card">
                                        <div className="apt-time-block">
                                            <div className="apt-time">{apt.time}</div>
                                            <div className="apt-duration">{apt.duration}</div>
                                        </div>
                                        <div className="apt-content">
                                            <div className="apt-title">{apt.title}</div>
                                            <div className="apt-address">📍 {apt.address}</div>
                                            {apt.eta !== '--' && (
                                                <div className="apt-eta">Next job in {apt.eta}</div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {!loading && appointments.length > 0 && (view === 'week' || view === 'month') && (
                            <div className="appointments-grouped">
                                {groupByDate(appointments).map(([date, dayAppointments]) => {
                                    const dateObj = new Date(date + 'T00:00:00');
                                    return (
                                    <div key={date} className="day-section">
                                        <div className="day-header">
                                            {dateObj.toLocaleDateString('en-AU', { weekday: 'short', month: 'short', day: 'numeric' })}
                                        </div>
                                        <div className="day-appointments">
                                            {dayAppointments.map(apt => (
                                                <div key={apt.id} className="apt-compact">
                                                    <span className="time">{apt.time}</span>
                                                    <span className="title">{apt.title}</span>
                                                    <span className="duration">{apt.duration}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Render the dashboard
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
